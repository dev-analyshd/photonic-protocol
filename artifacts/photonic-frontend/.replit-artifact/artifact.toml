kind = "web"
previewPath = "/"
title = "PHOTONIC Protocol"
version = "1.0.0"
id = "artifacts/photonic-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21630

[services.development]
run = "pnpm --filter @workspace/photonic-frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/photonic-frontend", "run", "build" ]
publicDir = "artifacts/photonic-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21630"
BASE_PATH = "/"
